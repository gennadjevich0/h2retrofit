<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="H₂-Retrofit">
<meta name="theme-color" content="#080e1c">
<meta name="description" content="H₂-Retrofit Ireland — Green Hydrogen Drop-In Decarbonisation. County Clare Pilot. Investor Platform.">
<title>H₂-Retrofit Ireland · Investor Platform</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23080e1c'/%3E%3Ccircle cx='22' cy='32' r='10' fill='none' stroke='%2300d4a0' stroke-width='2.5'/%3E%3Ccircle cx='42' cy='32' r='10' fill='none' stroke='%2300d4a0' stroke-width='2.5'/%3E%3Cline x1='22' y1='28' x2='42' y2='28' stroke='%2300d4a0' stroke-width='2'/%3E%3Cline x1='22' y1='36' x2='42' y2='36' stroke='%2300d4a0' stroke-width='2'/%3E%3Ccircle cx='32' cy='14' r='6' fill='%2300d4a0' opacity='.8'/%3E%3Ccircle cx='32' cy='50' r='6' fill='%2300d4a0' opacity='.8'/%3E%3Ctext x='18' y='36' font-family='Arial Black' font-weight='900' font-size='10' fill='%2300d4a0'%3EH%3C/text%3E%3Ctext x='38' y='36' font-family='Arial Black' font-weight='900' font-size='10' fill='%2300d4a0'%3E%E2%82%82%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080e1c;--card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e2e8f4;--text2:#8fa3c0;--text3:#4a6080;
  --teal:#00d4a0;--teal2:rgba(0,212,160,0.1);--teal3:rgba(0,212,160,0.06);
  --amber:#f5a623;--red:#e84040;--blue:#3d8ef5;--purple:#a78bfa;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;padding-top:env(safe-area-inset-top)}
.outer{max-width:980px;margin:0 auto;padding:0 20px 80px}

/* HEADER */
.hdr{padding:20px 0 14px;border-bottom:1px solid var(--border);margin-bottom:20px}
.hdr-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo svg{width:34px;height:34px;flex-shrink:0}
.logo-txt{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:-0.3px}
.logo-txt em{color:var(--teal);font-style:normal}
.lang-bar{display:flex;gap:4px}
.lb{padding:4px 12px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border2);border-radius:20px;color:var(--text2);background:transparent;transition:all .15s;font-family:'DM Sans',sans-serif}
.lb.on,.lb:hover{border-color:var(--teal);color:var(--teal);background:var(--teal2)}

/* TAGLINE PILLS */
.tbar{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.tpill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;font-size:11px;cursor:pointer;border:1px solid var(--border);border-radius:20px;color:var(--text3);background:transparent;transition:all .18s;font-family:'DM Sans',sans-serif}
.tpill:hover,.tpill.on{border-color:var(--teal);color:var(--teal);background:var(--teal3)}
.tpill-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

/* INFO PANEL */
.ipanel{display:none;margin-top:10px;padding:14px 16px;background:rgba(0,212,160,0.05);border:1px solid rgba(0,212,160,0.18);border-radius:10px;animation:fin .18s}
.ipanel.show{display:block}
.ip-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--teal);margin-bottom:6px}
.ip-body{font-size:13px;color:var(--text2);line-height:1.75}
.ip-body strong{color:var(--text);font-weight:500}
.ip-body .stat{display:inline-block;background:rgba(255,255,255,0.06);border-radius:5px;padding:1px 7px;margin:1px 2px;font-size:12px;color:var(--teal);font-weight:500}
@keyframes fin{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

/* NAV */
.nav{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav::-webkit-scrollbar{display:none}
.nb{padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.nb.on{color:var(--teal);border-bottom-color:var(--teal)}
.nb:hover:not(.on){color:var(--text)}
.sec{display:none}.sec.on{display:block}

/* GRIDS */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g2n{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:600px){
  .g4{grid-template-columns:1fr 1fr}
  .g2,.g2n{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr 1fr}
}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:0}
.mcard{background:var(--card);border-radius:10px;padding:13px 15px}
.mlabel{font-size:11px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}
.mval{font-size:21px;font-weight:500;line-height:1.2}
.msub{font-size:11px;color:var(--text3);margin-top:2px}
.teal{color:var(--teal)}.amber{color:var(--amber)}.red{color:var(--red)}.blue{color:var(--blue)}.purple{color:var(--purple)}
.st{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;margin-top:14px}
.st:first-child{margin-top:0}
.row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px}
.row:last-child{border:none}
.rk{color:var(--text2);flex:1}.rv{font-weight:500;text-align:right;flex-shrink:0}
.hl{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;background:rgba(0,212,160,0.07);border:1px solid rgba(0,212,160,0.2);border-radius:8px;margin:7px 0;font-size:13px;gap:8px}
.hlk{color:var(--teal)}.hlv{font-weight:500;color:var(--teal);text-align:right}
.hl-red{background:rgba(232,64,64,0.06);border-color:rgba(232,64,64,0.2)}
.hlk-r{color:var(--red)}.hlv-r{color:var(--red);font-weight:500;text-align:right}

/* RICH CONTENT */
.prose{font-size:13px;color:var(--text2);line-height:1.8}
.prose p{margin-bottom:10px}
.prose p:last-child{margin-bottom:0}
.prose strong{color:var(--text);font-weight:500}
.kv-block{background:rgba(255,255,255,0.03);border-left:3px solid var(--teal);border-radius:0 8px 8px 0;padding:10px 13px;margin:10px 0;font-size:13px;color:var(--text2);line-height:1.7}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;margin:2px 2px}
.tag-t{background:rgba(0,212,160,0.12);color:var(--teal)}
.tag-b{background:rgba(61,142,245,0.12);color:var(--blue)}
.tag-a{background:rgba(245,166,35,0.12);color:var(--amber)}
.tag-r{background:rgba(232,64,64,0.12);color:var(--red)}
.tag-p{background:rgba(167,139,250,0.12);color:var(--purple)}

/* SLIDERS */
.sr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sl{font-size:12px;color:var(--text2);flex:0 0 180px}
.sr input[type=range]{flex:1;accent-color:var(--teal);cursor:pointer}
.sv{font-size:12px;font-weight:500;min-width:66px;text-align:right;color:var(--text)}
.stabs{display:flex;gap:5px;margin-bottom:14px}
.stab{padding:5px 16px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);border-radius:20px;color:var(--text2);background:transparent;transition:all .15s;font-family:'DM Sans',sans-serif}
.stab.opt.on{border-color:var(--teal);color:var(--teal);background:rgba(0,212,160,0.08)}
.stab.base.on{border-color:var(--blue);color:var(--blue);background:rgba(61,142,245,0.08)}
.stab.cons.on{border-color:var(--amber);color:var(--amber);background:rgba(245,166,35,0.08)}

/* TIMELINE */
.tl{padding-left:6px}
.tli{position:relative;padding:0 0 18px 18px;border-left:2px solid rgba(255,255,255,0.07)}
.tli:last-child{border-left:2px solid transparent}
.tldot{position:absolute;left:-5px;top:5px;width:8px;height:8px;border-radius:50%}
.tlyear{font-size:11px;font-weight:700;margin-bottom:1px;letter-spacing:.04em}
.tltitle{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:3px}
.tltext{font-size:12px;color:var(--text3);line-height:1.55}

/* COMPARE */
.ccard{border-radius:12px;padding:14px;border:1px solid var(--border);background:var(--card)}
.ccard.feat{border-color:rgba(0,212,160,0.35);background:rgba(0,212,160,0.04)}
.cbadge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:6px;background:rgba(0,212,160,0.15);color:var(--teal);text-transform:uppercase;letter-spacing:.05em}
.cname{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:3px}
.cprice{font-size:20px;font-weight:500;margin-bottom:7px}
.cbar-bg{height:4px;background:rgba(255,255,255,0.07);border-radius:2px;margin-bottom:9px}
.cbar{height:4px;border-radius:2px}
.clist{font-size:12px;color:var(--text2);line-height:1.85}
.ch-wrap{position:relative;width:100%;height:230px;margin-top:14px}

/* CONTACT */
.inp{width:100%;padding:8px 12px;background:rgba(255,255,255,0.05);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;margin-bottom:9px;outline:none;transition:border .15s}
.inp:focus{border-color:rgba(0,212,160,0.4)}
.inp option{background:#111827}
textarea.inp{height:85px;resize:vertical}
.btn-send{padding:10px 26px;background:var(--teal);color:#080e1c;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-send:hover{opacity:.85}
.badge-ms{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px}
.prose p{margin-bottom:10px;font-size:13px;color:var(--text2);line-height:1.8}
.prose p:last-child{margin-bottom:0}
.prose strong{color:var(--text);font-weight:500}
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
.tbl th{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:5px 8px;border-bottom:1px solid var(--border);text-align:left}
.tbl td{padding:7px 8px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:top}
.tbl tr:last-child td{border:none}
.tbl td.good{color:var(--teal);font-weight:500}
.tbl td.bad{color:var(--red);font-weight:500}
.bbl{background:rgba(61,142,245,0.12);color:var(--blue)}
.btl{background:rgba(0,212,160,0.12);color:var(--teal)}
.bal{background:rgba(245,166,35,0.12);color:var(--amber)}

/* INSTALL BANNER */
.install-banner{display:none;margin-top:10px;padding:12px 16px;background:rgba(61,142,245,0.08);border:1px solid rgba(61,142,245,0.25);border-radius:10px;font-size:12px;color:var(--text2);line-height:1.6}
.install-banner strong{color:var(--blue)}
.install-banner.show{display:block}
</style>
</head>
<body>
<div class="outer">

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div class="logo">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="14" fill="#080e1c"/>
        <circle cx="22" cy="32" r="10" fill="none" stroke="#00d4a0" stroke-width="2.5"/>
        <circle cx="42" cy="32" r="10" fill="none" stroke="#00d4a0" stroke-width="2.5"/>
        <line x1="22" y1="28" x2="42" y2="28" stroke="#00d4a0" stroke-width="2"/>
        <line x1="22" y1="36" x2="42" y2="36" stroke="#00d4a0" stroke-width="2"/>
        <circle cx="32" cy="14" r="6" fill="#00d4a0" opacity=".8"/>
        <circle cx="32" cy="50" r="6" fill="#00d4a0" opacity=".8"/>
        <line x1="24" y1="24" x2="28" y2="18" stroke="#00d4a0" stroke-width="1.5" opacity=".5"/>
        <line x1="40" y1="24" x2="36" y2="18" stroke="#00d4a0" stroke-width="1.5" opacity=".5"/>
        <line x1="24" y1="40" x2="28" y2="46" stroke="#00d4a0" stroke-width="1.5" opacity=".5"/>
        <line x1="40" y1="40" x2="36" y2="46" stroke="#00d4a0" stroke-width="1.5" opacity=".5"/>
        <text x="17" y="36" font-family="Arial Black" font-weight="900" font-size="11" fill="#00d4a0">H</text>
        <text x="36" y="36" font-family="Arial Black" font-weight="900" font-size="11" fill="#00d4a0">₂</text>
      </svg>
      <span class="logo-txt"><em>H₂</em>-Retrofit Ireland</span>
    </div>
    <div class="lang-bar">
      <button class="lb on" onclick="setLang('en')">EN</button>
      <button class="lb" onclick="setLang('fr')">FR</button>
      <button class="lb" onclick="setLang('de')">DE</button>
      <button class="lb" onclick="setLang('es')">ES</button>
      <button class="lb" onclick="setLang('ru')">RU</button>
    </div>
  </div>
  <div class="tbar" id="tbar"></div>
  <div class="ipanel" id="ipanel">
    <div class="ip-title" id="ip-title"></div>
    <div class="ip-body" id="ip-body"></div>
  </div>
  <div class="install-banner" id="install-banner"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="nb on" onclick="showTab('overview')" id="nav-overview"></button>
  <button class="nb" onclick="showTab('calc')" id="nav-calc"></button>
  <button class="nb" onclick="showTab('timeline')" id="nav-timeline"></button>
  <button class="nb" onclick="showTab('market')" id="nav-market"></button>
  <button class="nb" onclick="showTab('contact')" id="nav-contact"></button>
</div>

<!-- ══════════════ OVERVIEW ══════════════ -->
<div id="tab-overview" class="sec on">
  <div class="g4">
    <div class="mcard"><div class="mlabel" id="ov-l1"></div><div class="mval teal">€1.5M</div><div class="msub" id="ov-s1"></div></div>
    <div class="mcard"><div class="mlabel" id="ov-l2"></div><div class="mval">445k</div><div class="msub" id="ov-s2"></div></div>
    <div class="mcard"><div class="mlabel" id="ov-l3"></div><div class="mval teal">€3–6k</div><div class="msub" id="ov-s3"></div></div>
    <div class="mcard"><div class="mlabel" id="ov-l4"></div><div class="mval teal">50k+</div><div class="msub" id="ov-s4"></div></div>
  </div>

  <!-- FULL PROBLEM SECTION -->
  <div class="card" style="margin-bottom:14px">
    <div class="st" id="ov-prob-title"></div>
    <div class="prose" id="ov-prob-prose"></div>
    <div class="g2n" style="margin-top:12px;margin-bottom:0">
      <div>
        <div class="row"><span class="rk" id="p1k"></span><span class="rv">500,000</span></div>
        <div class="row"><span class="rk" id="p2k"></span><span class="rv">55,000</span></div>
        <div class="row"><span class="rk" id="p3k"></span><span class="rv amber">~30%</span></div>
      </div>
      <div>
        <div class="row"><span class="rk" id="p4k"></span><span class="rv amber">€49,600</span></div>
        <div class="row"><span class="rk" id="p5k"></span><span class="rv amber">€22B</span></div>
        <div class="row"><span class="rk" id="p6k"></span><span class="rv red">€8B+</span></div>
      </div>
    </div>
  </div>

  <!-- FULL SOLUTION SECTION -->
  <div class="card" style="margin-bottom:14px">
    <div class="st" id="ov-sol-title"></div>
    <div class="prose" id="ov-sol-prose"></div>
    <div class="g2n" style="margin-top:12px;margin-bottom:0">
      <div>
        <div class="row"><span class="rk" id="s1k"></span><span class="rv teal">€3,000–6,000</span></div>
        <div class="row"><span class="rk" id="s2k"></span><span class="rv teal" id="s2v"></span></div>
        <div class="row"><span class="rk" id="s3k"></span><span class="rv teal" id="s3v"></span></div>
      </div>
      <div>
        <div class="row"><span class="rk" id="s4k"></span><span class="rv">98%</span></div>
        <div class="row"><span class="rk" id="s5k"></span><span class="rv teal">€1.5–2.5/kg</span></div>
        <div class="row"><span class="rk" id="s6k"></span><span class="rv amber">€6–10/kg</span></div>
      </div>
    </div>
  </div>

  <!-- THERMODYNAMIC STRATEGY -->
  <div class="card" style="margin-bottom:14px">
    <div class="st" id="ov-thermo-title"></div>
    <div class="prose" id="ov-thermo-prose"></div>
  </div>

  <!-- CIRCULAR LOOP -->
  <div class="card">
    <div class="st" id="ov-cycle-title"></div>
    <div style="display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:12px" id="cycle-flow"></div>
    <div class="prose" id="ov-cycle-prose"></div>
  </div>
</div>

<!-- ══════════════ CALCULATOR ══════════════ -->
<div id="tab-calc" class="sec">
  <div class="stabs">
    <button class="stab opt on" onclick="setScen('opt',this)" id="scen-opt"></button>
    <button class="stab base" onclick="setScen('base',this)" id="scen-base"></button>
    <button class="stab cons" onclick="setScen('cons',this)" id="scen-cons"></button>
  </div>
  <div class="g2">
    <div class="card">
      <div class="st" id="calc-params-title"></div>
      <div class="sr"><span class="sl" id="c-inv-l"></span><input type="range" min="1" max="50" step="0.5" value="5" id="inv" oninput="recalc()"><span class="sv" id="inv-v">€5M</span></div>
      <div class="sr"><span class="sl" id="c-homes-l"></span><input type="range" min="100" max="20000" step="100" value="1000" id="homes" oninput="recalc()"><span class="sv" id="homes-v">1,000</span></div>
      <div class="sr"><span class="sl" id="c-price-l"></span><input type="range" min="3" max="8" step="0.5" value="4.5" id="price" oninput="recalc()"><span class="sv" id="price-v">€4.5k</span></div>
      <div class="sr"><span class="sl" id="c-margin-l"></span><input type="range" min="2" max="25" step="1" value="8" id="margin" oninput="recalc()"><span class="sv" id="margin-v">8%</span></div>
      <div class="sr"><span class="sl" id="c-h2p-l"></span><input type="range" min="100" max="5000" step="100" value="1000" id="h2prod" oninput="recalc()"><span class="sv" id="h2prod-v">1,000t</span></div>
      <div class="sr"><span class="sl" id="c-h2px-l"></span><input type="range" min="2" max="12" step="0.5" value="4" id="h2px" oninput="recalc()"><span class="sv" id="h2px-v">€4/kg</span></div>
      <div class="sr"><span class="sl" id="c-disc-l"></span><input type="range" min="3" max="15" step="1" value="8" id="disc" oninput="recalc()"><span class="sv" id="disc-v">8%</span></div>
    </div>
    <div class="card">
      <div class="st" id="calc-results-title"></div>
      <div id="calc-results"></div>
      <div class="ch-wrap"><canvas id="calcChart"></canvas></div>
    </div>
  </div>
  <!-- CALC CONTEXT -->
  <div class="card" style="margin-top:0">
    <div class="st" id="calc-ctx-title"></div>
    <div class="prose" id="calc-ctx-prose"></div>
  </div>
</div>

<!-- ══════════════ TIMELINE ══════════════ -->
<div id="tab-timeline" class="sec">
  <div class="g2">
    <div class="card">
      <div class="st" id="tl-phases-title"></div>

const T={
en:{
  pills:[
    {id:'dropin',label:'Drop-In Decarbonisation',title:'Drop-In Decarbonisation',body:`Ireland cannot meet its 2030 climate targets without decarbonising heat. Conventional deep retrofit costs <span class="stat">€49,600/home</span> and is structurally impossible for <span class="stat">~30%</span> of Irish homes with solid stone walls.<br><br>The H₂-ready drop-in boiler replaces only the gas burner unit, fitting existing radiators and pipework. <strong>Zero structural changes. Installed in one day. Cost €3,000–6,000.</strong> It runs on green hydrogen produced from curtailed wind — the <span class="stat">2.1 TWh</span> wasted annually by EirGrid because the grid cannot absorb it.<br><br>This is the only viable decarbonisation pathway for hard-to-treat homes.`},
    {id:'green',label:'Green Hydrogen',title:'Green Hydrogen from Curtailed Wind',body:`EirGrid pays generators to <em>switch off</em> when wind production exceeds grid capacity. In 2025, <span class="stat">2.1 TWh</span> of renewable electricity was wasted — enough to power County Dublin for a year.<br><br>We capture that curtailed energy at near-zero cost (<span class="stat">~€0.01/kWh</span>) through electrolysis and convert it to green hydrogen. Production cost: <span class="stat">€1.5–2.5/kg</span> vs <span class="stat">€6–10/kg</span> from grid electricity. <strong>4–6× cost advantage.</strong><br><br>The alternative to selling this electricity to our electrolyser is literally zero. Any price we pay is pure gain for the grid operator.`},
    {id:'circular',label:'Circular Economy',title:'The Circular Economy Loop',body:`The H₂-Retrofit model is self-reinforcing: <strong>Wind → H₂ → Home Heat → Farm Subsidies → Forests → Clean Water → Health Savings → Reinvest → More Wind Infrastructure.</strong><br><br>H₂ revenues fund the voluntary 20% Covenant — farmers reduce livestock, plant native woodland, and receive <span class="stat">€12–18k/yr</span> subsidy while carbon credits accumulate from Year 5.<br><br>Forest buffer zones reduce nitrogen runoff into rivers and lakes. Ireland has the <span class="stat">#1 nitrogen footprint/hectare</span> in the EU. Cleaner water reduces the <span class="stat">€1B+/yr</span> remediation bill. Health savings reinvest into new H₂ infrastructure. <strong>Entropy decreases. The system self-sustains.</strong>`},
    {id:'pilot',label:'County Clare Pilot',title:'County Clare Pilot Site',body:`Clare is the ideal pilot: Moneypoint (915 MW, Kilrush) stopped burning coal in June 2025 and needs a domestic H₂ supplier confirmed before 2029. The River Fergus and Ballyallia Lake SAC (site 000014) face direct agricultural nitrogen pressure — demonstrating water quality improvement from the pilot has immediate policy value.<br><br><strong>Phase 1 (2025–27):</strong> 5–10 social homes, gas network integration, 12 months performance data. Cost: <span class="stat">€1.5M</span> via DTIF + PSO Levy redirect (4% of existing €37.5M pool).<br><br>Contact: Juri Ptitsin · +353 86 244 5827. Partners: TUS · UCC · UL · GNI · SEAI · IFA.`},
    {id:'national',label:'National Rollout',title:'National Rollout Strategy',body:`Phase 2 (2027–30): Electrolyser self-funded at <span class="stat">€21M/yr</span> curtailed revenue. <span class="stat">€63M</span> over 3 years with no grants or government debt. First H₂ delivery to Moneypoint 2028. ESB contract confirmed before their 2029 deadline.<br><br>Phase 3 (2030–35): First 100% H₂ residential districts. Clare becomes the national template. Shannon deepwater port opens the Atlantic H₂ export corridor to UK and EU markets.<br><br>Phase 4 (2035–45): Ireland H₂ exporter. <span class="stat">2M ha</span> native woodland by 2045 sequesters <span class="stat">8–12M tonnes CO₂/yr</span>. <span class="stat">50,000+</span> jobs created. <span class="stat">€5B+</span> annual H₂ export revenue. SACs restored to favourable conservation status.`}

  nav:['Overview','Calculator','Timeline','Market','Contact'],
  ov_l:['Pilot Funding','Market Size','Installation Cost','Jobs Potential'],
  ov_s:['DTIF / Clare CC','hard-to-treat homes','vs €49.6k deep retrofit','by 2030'],
  prob_title:'THE PROBLEM — IRELAND\'S RETROFIT CRISIS',
  prob_prose:`<p>Ireland has a legally binding commitment under the EU Effort Sharing Regulation: cut greenhouse gas emissions <strong>51% by 2030</strong> versus 2005 levels. Current trajectory: roughly 29%. That is not a rounding error — it is a structural failure. The gap lives almost entirely in one place: residential heating.</p>
<p><strong>500,000 homes need to be decarbonised by 2030.</strong> We have completed 55,000. The conventional prescription — deep retrofit at €49,600 per home — applied to the remaining 445,000 produces a bill of <strong>€22 billion</strong>. More importantly, it cannot be done for roughly 30% of Irish housing stock. Pre-1940s solid-wall construction — stone, brick, mass concrete — has no cavity to fill. External insulation costs €15,000–25,000 for walls alone and requires planning permission. Heat pumps require low-temperature radiators these homes do not have. Solar PV generates electricity, not heat.</p>
<p>Only 12% of Irish households say they would try hydrogen heating, despite 53% wanting to change their heating system. The market exists — the demonstration is missing. <strong>A successful Clare pilot changes national perception.</strong></p>`,
  prob:[['Retrofit target by 2030',''],['Completed to date',''],['Hard-to-treat (no solution)',''],['Deep retrofit cost / home',''],['Total cost without H₂',''],['EU fines if targets missed','']],
  sol_title:'THE H₂ SOLUTION — DROP-IN TECHNOLOGY',
  sol_prose:`<p>The H₂-ready boiler replaces only the gas burner — fitting existing radiators, pipework, thermostat, and zone controls without modification. <strong>Zero structural changes. Installed in one day by a Gas Safe registered engineer. Cost: €3,000–6,000.</strong> The resident does not need to vacate the property. No planning permission required for like-for-like appliance replacement.</p>
<p>Fuel: green hydrogen produced from curtailed wind electricity at approximately €0.01/kWh — the constraint payment rate EirGrid pays to switch turbines off. At this input cost, hydrogen is produced for <strong>€1.5–2.5/kg versus €6–10/kg from grid electricity</strong> — a 4–6× structural cost advantage that no other EU geography can currently match. Only water vapour is emitted. Boiler thermal efficiency reaches 98% through condensing heat recovery. The technology is commercially available now: Worcester Bosch and Baxi both sell 100% H₂-ready domestic boilers. The H100 Fife pilot in Scotland has been running live residential hydrogen heating since 2023.</p>`,
  sol:[['Installation cost',''],['Installation time',''],['Structural changes',''],['Boiler efficiency',''],['H₂ cost from wind',''],['H₂ cost from grid','']],
  sol_vals:['1 day','Zero'],
  thermo_title:'THERMODYNAMIC STRATEGY — IRELAND AS CLOSED SYSTEM',
  thermo_prose:`<p>Apply the Second Law of Thermodynamics literally, not as a metaphor. In a closed system, entropy — disorder — always increases unless energy is actively input. Ireland is a closed island system with a defined physical boundary, measurable energy and nutrient flows, and controllable variables.</p>
<p>Look at what is happening inside that boundary. <strong>11.6% forest cover</strong> versus 38% EU average. <strong>53.4% of land under livestock</strong> versus ~25% Europe-wide. <strong>45%+ of ecosystems failing EU environmental standards.</strong> <strong>79% of fens lost since 1900.</strong> <strong>49% of lakes in poor or moderate water status.</strong> Energy import dependency ~70%. 445,000 homes with no decarbonisation path. These are not separate policy failures — they are five expressions of one dynamic: a closed system losing stored order faster than it is being restored.</p>
<p>The First Law says energy cannot be destroyed, only transformed. Ireland wastes 2.1 TWh of renewable electricity every year — dissipated as heat in switched-off turbines. <strong>The H₂-Retrofit strategy captures that dissipated energy and converts it into stored chemical order: hydrogen. Waste becomes fuel. Five failing systems are addressed simultaneously by one infrastructure investment.</strong></p>`,
  cycle_title:'CIRCULAR ECONOMY LOOP',
  cycle:['Wind (2.1 TWh)','→','Electrolysis','→','Green H₂','→','Home Heat','→','Farm Subsidies','→','Forests / SAC','→','Clean Water','→','Health Savings','→','Reinvest →'],
  cycle_prose:`<p>The loop is financial, not poetic. Curtailed wind at ~€0.01/kWh produces H₂ at €1.5–2.5/kg. Sold to homes and to ESB's Moneypoint at €4–6/kg, each kilogram generates €2–4 net margin. That margin funds the <strong>20% Covenant</strong>: farmers receive €12–18k/yr in H₂ transition subsidies in exchange for voluntary 20% herd reduction over 10 years — verified independently by ICBF ear-tag data, not self-reporting.</p>
<p>Freed land is planted with native woodland. Native woodland generates carbon credits from Year 5 at €50–90/tonne CO₂. Forest buffer zones reduce nitrogen loading on rivers and lakes — cutting Ireland's €1B+/yr water remediation bill. Improved water quality and air quality reduce hospital costs. Those health savings are reinvested into new electrolyser capacity. <strong>Money stops leaving Ireland. Entropy decreases. The system self-sustains without ongoing subsidy after Year 3.</strong></p>`,

  res_labels:['Annual revenue','IP royalties / yr','H₂ sales / yr','Gross profit','NPV (10 yr)','IRR','Payback period','ROI (5 yr)'],
  calc_ctx_title:'IP MODEL & FUNDING STRUCTURE',
  calc_ctx_prose:`The IP model is structured <strong></strong> — IP held by the project consortium.<br><br><strong>Funding path:</strong> DTIF (€1.5M+ initial) → PSO Levy redirect 4% of €37.5M pool → curtailed wind revenues €21M/yr self-fund the commercial electrolyser by Year 3 — no grants, no government debt after pilot phase.<br><br>The PSO Levy already collects €37.5M/year from energy consumers for green transition. Redirecting 4% to this pilot requires no new taxes and no new legislation — simply a ministerial decision.`,

  milestones:[['Clare pilot starts','2026','bl'],['Electrolyser funded','2027','bl'],['First Moneypoint delivery','2028','tl'],['ESB contract confirmed','2029','tl'],['20% H₂ grid blending','2028','al'],['100% H₂ conversion','2040s','al'],['60% catchment forest buffers','2040','tl'],['2M ha native woodland','2045','tl']],
  tl_esb_title:'MONEYPOINT — THE 2029 WINDOW',
  tl_esb_prose:`Moneypoint (Kilrush, Co. Clare) — Ireland's last coal plant — stopped burning coal in June 2025. ESB has publicly committed to converting the site to a green energy hub under the <em>Green Atlantic @ Moneypoint</em> programme. <strong>But ESB needs a domestic H₂ supplier confirmed before 2029 to proceed with turbine investment.</strong><br><br>No supplier confirmed = ESB looks abroad. Ireland loses the anchor contract that de-risks the entire national H₂ infrastructure buildout.<br><br>Our curtailed wind revenues accumulate <span class="tag tag-t">€21M/yr</span> into the H₂ fund. <span class="tag tag-t">€63M over 3 years</span> self-funds a commercial electrolyser at Shannon — no grants, no government debt. First delivery to Moneypoint: <span class="tag tag-b">2028</span>. Contract confirmed before ESB's deadline: <span class="tag tag-b">2029</span>. <strong>This is not competition with ESB — it is partnership. We solve their problem.</strong>`,
  tl_farm_title:'THE 20% COVENANT — VOLUNTARY TRANSITION',
  tl_farm_prose:`Governments that tried to mandate herd reduction failed politically. The 20% Covenant succeeds because <strong>it is voluntary, verifiable, and profitable for the farmer.</strong><br><br>Participating farmers voluntarily commit to a 20% reduction in livestock numbers over 10 years. In exchange: <span class="tag tag-t">€12,000–18,000/yr</span> H₂ transition subsidy. Freed land planted with native forest. Carbon credits from Year 5. <strong>Total income equal or higher than before.</strong><br><br>ICBF verifies each animal via ear-tag data — no self-reporting, no manipulation. The system self-selects first movers. No one loses income. No one is coerced. The circular economy funds the transition from within itself.`,
  mk_labels:['Curtailed Wind 2025','Offshore Wind Potential','H₂ Export by 2035'],
  mk_subs:['free feedstock annually','SEAI estimate','from offshore wind'],
  mk_absurd_title:'THE THERMODYNAMIC ABSURDITY',
  mk_absurd_prose:`Ireland sits in the Atlantic wind corridor — one of the most consistently windy locations in Europe. The Shannon Estuary has some of the highest offshore wind speeds on the continent. <strong>Yet Ireland imports ~70% of its energy and spends €8B+ annually on fossil fuel imports.</strong><br><br>Surplus wind is curtailed because the grid cannot absorb it — while Ireland simultaneously imports expensive gas. <span class="tag tag-a">2.1 TWh wasted in 2025</span> = enough to power County Dublin. EirGrid pays constraint payments. Ireland pays again for imported gas. Double the cost, zero the benefit.<br><br><strong>This is thermodynamic absurdity: valuable energy is dissipated as waste while money flows out of the country.</strong> The H₂-Retrofit model converts that dissipated energy into stored chemical order — national energy security, export revenue, and domestic heat decarbonisation simultaneously.`,
  ifa_title:'IFA €0.05 MECHANISM',
  ifa_rows:[['Market price / kWh','€0.27'],['IFA curtailed price','€0.05'],['Farmer savings / kWh','€0.22'],['H₂ fund levy','€0.01/kWh'],['PSO Levy annual pool','€37.5M'],['Pilot — 4% of pool','€1.5M']],
  ifa_prose:`Farmers pay <span class="tag tag-t">€0.05/kWh</span> for curtailed wind — saving <span class="tag tag-t">€0.22/kWh</span> vs market rate. Those savings fund voluntary herd reduction. <span class="tag tag-b">€0.01/kWh</span> accumulates into the H₂ electrolyser fund. Three outcomes from one price signal: cheaper electricity for farmers, H₂ fund growth, and voluntary livestock reduction. <strong>Zero government budget. Zero new taxes.</strong>`,
  fund_title:'H₂ FUND ACCUMULATION',
  fund_rows:[['Curtailed revenue / yr','€21M/yr'],['Self-funded in 3 years','€63M'],['Farmer transition subsidy','€12–18k/yr'],['Moneypoint capacity','915 MW'],['ESB decision deadline','2029'],['First Moneypoint delivery','2028']],
  fund_prose:`The fund accumulates passively from curtailed wind arbitrage. By Year 3, <span class="tag tag-t">€63M</span> self-funds a commercial electrolyser plant at Shannon — making the project fully independent of grants after the initial DTIF pilot phase.`,
  mk_pilot_k:'H₂ Pilot investment',mk_pilot_v:'€1.5M → multiple ROI',
  mk_fine_k:'EU fines if 2030 targets missed',mk_fine_v:'€8B+ (pure loss)',
  mk_fine_prose:`Ireland will pay EU fines for missing 2030 Effort Sharing Regulation targets. The choice is binary: <strong>pay €8B+ as a permanent loss with zero asset created, zero jobs, zero infrastructure</strong> — or invest €1.5M now and build a self-sustaining H₂ economy that avoids the fines and generates compounding return. <em>Any minister of finance understands this arithmetic.</em>`,
  cmp_title:'SOLUTION COMPARISON — HARD-TO-TREAT HOMES',
  solutions:[
    {feat:true,name:'H₂ Drop-In',price:'€3–6k',col:'#00d4a0',bar:12,items:['✓ 1-day installation','✓ No structural changes','✓ Works with solid stone walls','✓ Zero emissions (H₂O only)','✓ Uses existing radiators & pipework','✓ Powered by curtailed wind']},

    {feat:false,name:'Solar PV',price:'€8k',col:'#f5a623',bar:24,items:['✗ Ireland has low solar yield','✗ Generates electricity, not heat','✗ South-facing roof required','~ Excellent H₂ complement','~ Battery storage adds cost','~ Does not replace gas boiler']},
    {feat:false,name:'Deep Retrofit',price:'€49.6k',col:'#e84040',bar:100,items:['✗ Unaffordable for most households','✗ Months of disruptive works','✗ Impossible for solid stone walls','✗ Does not solve 30% of homes','~ Maximum long-term efficiency','~ SEAI grants partially available']}

  mk_eco_title:'IRELAND AS GLOBAL REFERENCE MODEL',
  mk_eco_prose:`An island is nature\'s perfect experimental unit: closed boundary, measurable flows, unambiguous results. <strong>Prove the circular H₂ model at Ireland\'s scale — then export it.</strong><br><br>Iceland, Canary Islands, Pacific island states, Malta — all face the same constraints: high wind resource, fossil import dependency, hard-to-treat building stock. Ireland\'s Atlantic position gives first-mover advantage on the EU–UK H₂ export corridor. Shannon deepwater port is ideal for offshore wind infrastructure. <strong>Clare pilot → national template → global export.</strong>`,

fr:{
  pills:[
    {id:'dropin',label:'Décarbonisation clé en main',title:'Décarbonisation Drop-In',body:`L'Irlande ne peut pas atteindre ses objectifs climatiques 2030 sans décarboniser le chauffage. La rénovation profonde conventionnelle coûte <span class="stat">€49 600/logement</span> et est structurellement impossible pour <span class="stat">~30%</span> des logements irlandais à murs en pierre massifs.<br><br>La chaudière H₂ drop-in remplace uniquement le brûleur, s'adaptant aux radiateurs et canalisations existants. <strong>Aucune modification structurelle. Installée en un jour. Coût €3 000–6 000.</strong>`},
    {id:'green',label:'Hydrogène vert',title:'Hydrogène vert — arbitrage éolien curtailed',body:`EirGrid paie les producteurs pour <em>s'éteindre</em> quand la production éolienne dépasse la capacité du réseau. En 2025, <span class="stat">2,1 TWh</span> d'électricité renouvelable ont été gaspillés. Nous capturons cette énergie curtailed à coût quasi-nul (<span class="stat">~€0,01/kWh</span>) et la convertissons en hydrogène vert. Coût de production: <span class="stat">€1,5–2,5/kg</span> vs <span class="stat">€6–10/kg</span> depuis le réseau. <strong>Avantage coût 4–6×.</strong>`},
    {id:'circular',label:'Économie circulaire',title:'La boucle d\'économie circulaire',body:`Le modèle H₂-Retrofit est auto-renforçant: <strong>Vent → H₂ → Chauffage → Subventions agricoles → Forêts → Eau propre → Économies santé → Réinvestissement.</strong><br><br>Les revenus H₂ financent le Pacte 20% volontaire — les agriculteurs réduisent le cheptel, plantent des forêts indigènes et reçoivent <span class="stat">€12–18k/an</span> de subvention. Les zones tampons forestières réduisent les rejets d'azote. <strong>L'entropie diminue. Le système se maintient.</strong>`},
    {id:'pilot',label:'Pilote Comté de Clare',title:'Site pilote — Comté de Clare',body:`Clare est le pilote idéal: Moneypoint (915 MW, Kilrush) a cessé de brûler du charbon en juin 2025 et a besoin d'un fournisseur H₂ domestique confirmé avant 2029. La rivière Fergus et le lac Ballyallia SAC (site 000014) subissent une pression agricole directe en azote.<br><br><strong>Phase 1 (2025–27):</strong> 5–10 logements sociaux, intégration réseau gaz, 12 mois de données. Coût: <span class="stat">€1,5M</span> via DTIF + redirection PSO Levy.`},
    {id:'national',label:'Déploiement national',title:'Stratégie de déploiement national',body:`Phase 2 (2027–30): Électrolyseur autofinancé à <span class="stat">€21M/an</span> de revenus curtailed. <span class="stat">€63M</span> sur 3 ans sans subventions ni dette publique. Première livraison H₂ à Moneypoint 2028.<br><br>Phase 4 (2035–45): Irlande exportatrice H₂. <span class="stat">2M ha</span> de forêt indigène séquestrant <span class="stat">8–12M tonnes CO₂/an</span>. <span class="stat">50 000+</span> emplois. <span class="stat">€5 Mrd+</span> de revenus d'exportation annuels.`}
  ],

  thermo_title:'STRATÉGIE THERMODYNAMIQUE — IRLANDE SYSTÈME FERMÉ',
  thermo_prose:`L'Irlande est un système insulaire fermé — frontière physique définie, flux d'énergie mesurables, variables contrôlables. Appliquer la thermodynamique: <strong>dans un système fermé, l'entropie augmente toujours sauf si de l'énergie est activement injectée.</strong><br><br>Couverture forestière: <strong>11,6%</strong> vs 38% moyenne UE. <strong>53,4%</strong> des terres pour l'élevage. <strong>45%+</strong> des écosystèmes en dessous des normes environnementales. L'isolement insulaire fait de l'Irlande le laboratoire idéal d'économie circulaire mondiale.`,

  tl_esb_title:'MONEYPOINT — LA FENÊTRE 2029',
  tl_esb_prose:`Moneypoint a cessé de brûler du charbon en juin 2025. ESB a besoin d'un fournisseur H₂ domestique confirmé avant 2029. <strong>Pas de fournisseur = ESB cherche à l'étranger. L'Irlande perd le contrat d'ancrage.</strong><br><br>Nos revenus curtailed accumulent <span class="tag tag-t">€21M/an</span>. <span class="tag tag-t">€63M sur 3 ans</span> autofinancent un électrolyseur commercial à Shannon. Première livraison: <span class="tag tag-b">2028</span>. Contrat confirmé: <span class="tag tag-b">2029</span>.`,
  tl_farm_title:'LE PACTE 20% — TRANSITION VOLONTAIRE',
  tl_farm_prose:`Les gouvernements qui ont tenté de mandater la réduction du cheptel ont échoué politiquement. Le Pacte 20% réussit parce qu'<strong>il est volontaire, vérifiable et rentable pour l'agriculteur.</strong><br><br>En échange d'une réduction de 20% du cheptel sur 10 ans: <span class="tag tag-t">€12 000–18 000/an</span> de subvention H₂. Terres libérées plantées en forêt indigène. Crédits carbone dès l'Année 5. <strong>Revenu total égal ou supérieur à avant.</strong>`,

  mk_absurd_prose:`L'Irlande se trouve dans le couloir éolien atlantique et importe pourtant <strong>~70% de son énergie</strong>, dépensant <strong>€8 Mrd+</strong> annuellement en importations de combustibles fossiles. L'éolien surplus est curtailed pendant qu'on importe du gaz coûteux. <strong>Double coût, zéro bénéfice — absurdité thermodynamique pure.</strong>`,

  ifa_prose:`Les agriculteurs paient <span class="tag tag-t">€0,05/kWh</span> pour l'éolien curtailed — économisant <span class="tag tag-t">€0,22/kWh</span>. Ces économies financent la réduction volontaire du cheptel. <span class="tag tag-b">€0,01/kWh</span> s'accumule dans le fonds H₂. <strong>Zéro budget public. Zéro nouvelle taxe.</strong>`,

  fund_prose:`Le fonds s'accumule passivement depuis l'arbitrage curtailed. En Année 3, <span class="tag tag-t">€63M</span> autofinancent un électrolyseur commercial à Shannon — indépendance totale des subventions après la phase pilote DTIF.`,

  mk_eco_title:'IRLANDE COMME MODÈLE MONDIAL',
  mk_eco_prose:`Une île est l'unité expérimentale parfaite de la nature: frontière fermée, flux mesurables, résultats non ambigus. <strong>Prouver le modèle H₂ circulaire à l'échelle irlandaise — puis l'exporter.</strong> Islande, Canaries, îles du Pacifique, Malte — tous font face aux mêmes contraintes. L'Irlande a l'avantage du premier entrant sur le couloir d'export H₂ atlantique EU–UK.`,

de:{
  pills:[
    {id:'dropin',label:'Drop-In-Dekarbonisierung',title:'Drop-In-Dekarbonisierung',body:`Deutschland verfehlt seine Klimaziele. Irland auch. Die konventionelle Tiefenrenovierung kostet <span class="stat">€49.600/Haus</span> und ist für <span class="stat">~30%</span> der irischen Steinhäuser strukturell unmöglich.<br><br>Der H₂-fähige Drop-In-Kessel ersetzt nur den Gasbrenner, passt zu vorhandenen Heizkörpern. <strong>Keine baulichen Veränderungen. Installation in einem Tag. Kosten €3.000–6.000.</strong>`},
    {id:'green',label:'Grüner Wasserstoff',title:'Grüner Wasserstoff aus abgeregeltem Wind',body:`EirGrid zahlt Erzeugern dafür, <em>abzuschalten</em>, wenn Windproduktion die Netzkapazität übersteigt. 2025 wurden <span class="stat">2,1 TWh</span> erneuerbare Energie verschwendet. Wir nutzen diese abgeregelte Energie zu Kosten von <span class="stat">~€0,01/kWh</span> und wandeln sie in grünen Wasserstoff um. Produktionskosten: <span class="stat">€1,5–2,5/kg</span> vs <span class="stat">€6–10/kg</span> aus dem Netz. <strong>4–6× Kostenvorteil.</strong>`},
    {id:'circular',label:'Kreislaufwirtschaft',title:'Die Kreislaufwirtschaftsschleife',body:`Das H₂-Retrofit-Modell ist selbstverstärkend: <strong>Wind → H₂ → Wärme → Agrarsubventionen → Wälder → Sauberes Wasser → Gesundheitseinsparungen → Reinvestition.</strong><br><br>H₂-Erlöse finanzieren den freiwilligen 20%-Covenant — Landwirte reduzieren den Bestand, pflanzen heimischen Wald und erhalten <span class="stat">€12–18k/Jahr</span> Subvention. <strong>Die Entropie nimmt ab. Das System trägt sich selbst.</strong>`},
    {id:'pilot',label:'Pilotprojekt County Clare',title:'Pilotstandort — County Clare',body:`Clare ist der ideale Pilotstandort: Moneypoint (915 MW, Kilrush) hat im Juni 2025 die Kohleverbrennung eingestellt und benötigt vor 2029 einen bestätigten inländischen H₂-Lieferanten.<br><br><strong>Phase 1 (2025–27):</strong> 5–10 Sozialwohnungen, Gasnetintegration, 12 Monate Leistungsdaten. Kosten: <span class="stat">€1,5M</span> via DTIF.`},
    {id:'national',label:'Nationaler Rollout',title:'Nationale Rollout-Strategie',body:`Phase 2 (2027–30): Elektrolyseur selbstfinanziert mit <span class="stat">€21M/Jahr</span> Abregelungserlösen. <span class="stat">€63M</span> in 3 Jahren ohne Subventionen.<br><br>Phase 4 (2035–45): Irland H₂-Exporteur. <span class="stat">2M ha</span> heimischer Wald. <span class="stat">50.000+</span> Arbeitsplätze. <span class="stat">€5 Mrd.+</span> jährliche Exporterlöse.`}
  ],

  thermo_title:'THERMODYNAMISCHE STRATEGIE — IRLAND ALS GESCHLOSSENES SYSTEM',
  thermo_prose:`Irland ist ein geschlossenes Inselsystem — definierte physikalische Grenze, messbare Energieflüsse. Thermodynamik anwenden: <strong>In einem geschlossenen System nimmt die Entropie immer zu, sofern keine Energie aktiv eingebracht wird.</strong><br><br>Waldbedeckung: <strong>11,6%</strong> vs EU-Schnitt 38%. <strong>53,4%</strong> der Fläche für Viehzucht. <strong>45%+</strong> der Ökosysteme unter Umweltstandards. Die Insellage macht Irland zum idealen Kreislaufwirtschaftslabor der Welt.`,

  cycle:['Wind (2,1 TWh)','→','Elektrolyse','→','Grüner H₂','→','Wärme','→','Agrarsubventionen','→','Wälder / SAC','→','Sauberes Wasser','→','Gesundheitseinspar.','→','Reinvestieren →'],
  cycle_prose:`Jedes Element finanziert das nächste. Die <strong>Windabregelung</strong> liefert Quasi-Gratis-Rohstoff. <strong>H₂-Verkäufe</strong> füllen den Fonds. Der <strong>20%-Covenant</strong> zahlt Landwirten für freiwillige Bestandsreduzierung. <strong>Heimischer Wald</strong> erzeugt ab Jahr 5 CO₂-Zertifikate. <strong>Saubereres Wasser</strong> reduziert die €1Mrd.+/Jahr-Sanierungsrechnung.`,

  calc_ctx_prose:`Das IP-Modell ist <strong></strong> strukturiert — 98% beim Projekt, 2% für UCC. Finanzierungsweg: DTIF (€1,5M initial) → PSO-Levy-Umleitung 4% des €37,5M-Pools → Abregelungserlöse €21M/Jahr finanzieren den kommerziellen Elektrolyseur in Jahr 3 selbst. <strong>Keine Subventionen, keine öffentliche Verschuldung nach der Pilotphase.</strong>`,

es:{
  pills:[
    {id:'dropin',label:'Descarbonización plug-in',title:'Descarbonización Drop-In',body:`Irlanda no puede cumplir sus objetivos climáticos 2030 sin descarbonizar la calefacción. La renovación profunda convencional cuesta <span class="stat">€49.600/hogar</span> y es estructuralmente imposible para <span class="stat">~30%</span> de los hogares irlandeses con muros de piedra maciza.<br><br>La caldera H₂ drop-in reemplaza solo el quemador, adaptándose a radiadores y tuberías existentes. <strong>Sin cambios estructurales. Instalada en un día. Coste €3.000–6.000.</strong>`},
    {id:'green',label:'Hidrógeno verde',title:'Hidrógeno verde — arbitraje eólico curtailed',body:`EirGrid paga a los generadores para que se <em>apaguen</em> cuando la producción eólica supera la capacidad de la red. En 2025, <span class="stat">2,1 TWh</span> de energía renovable fueron desperdiciados. Capturamos esa energía curtailed a coste casi cero (<span class="stat">~€0,01/kWh</span>) y la convertimos en hidrógeno verde. Coste de producción: <span class="stat">€1,5–2,5/kg</span> vs <span class="stat">€6–10/kg</span> de la red. <strong>Ventaja de coste 4–6×.</strong>`},
    {id:'circular',label:'Economía circular',title:'El bucle de economía circular',body:`El modelo H₂-Retrofit es auto-reforzante: <strong>Viento → H₂ → Calefacción → Subsidios agrícolas → Bosques → Agua limpia → Ahorro sanitario → Reinversión.</strong><br><br>Los ingresos H₂ financian el Pacto 20% voluntario — los agricultores reducen el ganado, plantan bosque nativo y reciben <span class="stat">€12–18k/año</span> de subsidio. <strong>La entropía disminuye. El sistema se auto-sostiene.</strong>`},
    {id:'pilot',label:'Piloto Condado de Clare',title:'Sitio piloto — Condado de Clare',body:`Clare es el piloto ideal: Moneypoint (915 MW, Kilrush) dejó de quemar carbón en junio 2025 y necesita un proveedor H₂ doméstico confirmado antes de 2029.<br><br><strong>Fase 1 (2025–27):</strong> 5–10 viviendas sociales, integración red gas, 12 meses datos. Coste: <span class="stat">€1,5M</span> via DTIF.`},
    {id:'national',label:'Despliegue nacional',title:'Estrategia de despliegue nacional',body:`Fase 2 (2027–30): Electrolizador autofinanciado con <span class="stat">€21M/año</span> de ingresos curtailed. <span class="stat">€63M</span> en 3 años sin subvenciones.<br><br>Fase 4 (2035–45): Irlanda exportadora H₂. <span class="stat">2M ha</span> bosque nativo. <span class="stat">50.000+</span> empleos. <span class="stat">€5B+</span> ingresos anuales de exportación.`}
  ],

  thermo_prose:`Irlanda es un sistema insular cerrado — frontera física definida, flujos de energía medibles. Aplicar termodinámica: <strong>En un sistema cerrado, la entropía siempre aumenta salvo que se inyecte energía activamente.</strong><br><br>Cobertura forestal: <strong>11,6%</strong> vs media UE 38%. <strong>53,4%</strong> del suelo para ganadería. <strong>45%+</strong> de ecosistemas por debajo de estándares ambientales. El aislamiento insular hace de Irlanda el laboratorio ideal de economía circular mundial.`,

ru:{
  pills:[
    {id:'dropin',label:'Декарбонизация Drop-In',title:'Декарбонизация Drop-In',body:`Ирландия не может выполнить климатические цели 2030 без декарбонизации отопления. Обычный глубокий ремонт стоит <span class="stat">€49 600/дом</span> и структурно невозможен для <span class="stat">~30%</span> ирландских домов с каменными стенами.<br><br>H₂-котёл drop-in заменяет только газовую горелку, подходит к существующим радиаторам и трубопроводам. <strong>Ноль структурных изменений. Установка за один день. Стоимость €3 000–6 000.</strong>`},

function setLang(l){
  lang=l;
  document.querySelectorAll('.lb').forEach(b=>b.classList.remove('on'));
  document.querySelector(`.lb[onclick="setLang('${l}')"]`).classList.add('on');
  activePill=null;
  render();
}

═══════════════════════════════════════════════ */
function showTab(id){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+id).classList.add('on');
  const idx={overview:0,calc:1,timeline:2,market:3,contact:4}[id];
  document.querySelectorAll('.nb')[idx].classList.add('on');
  if(id==='calc') setTimeout(recalc,60);
  if(id==='timeline') setTimeout(renderTlChart,60);
}

/* ═══════════════════════════════════════════════
   PILL TOGGLE
═══════════════════════════════════════════════ */
function togglePill(id){
  const t=T[lang];
  const pill=t.pills.find(p=>p.id===id);
  const panel=document.getElementById('ipanel');
  if(activePill===id){
    activePill=null;
    panel.classList.remove('show');
    document.querySelectorAll('.tpill').forEach(p=>p.classList.remove('on'));
    return;
  }
  activePill=id;
  document.querySelectorAll('.tpill').forEach(p=>p.classList.remove('on'));
  document.querySelector(`.tpill[data-id="${id}"]`).classList.add('on');
  document.getElementById('ip-title').textContent=pill.title;
  document.getElementById('ip-body').innerHTML=pill.body;
  panel.classList.add('show');
}

  scen=s;

function fmtM(n){
  const a=Math.abs(n);
  const s=n<0?'-':'';
  return s+'€'+Math.round(a/1e5)/10+'M';
}
function fmtPct(n){return Math.round(n*10)/10+'%'}

  const m=SCEN[scen];

  document.getElementById('inv-v').textContent='€'+inv+'M';

  document.getElementById('price-v').textContent='€'+price+'k';
  document.getElementById('margin-v').textContent=Math.round(margin*100)+'%';
  document.getElementById('h2prod-v').textContent=h2prod.toLocaleString()+'t';
  document.getElementById('h2px-v').textContent='€'+h2px+'/kg';
  document.getElementById('disc-v').textContent=Math.round(disc*100)+'%';

  const rev_boiler=homes*price*1000*m.rm;
  const ip=rev_boiler*margin;
  const h2rev=h2prod*1000*h2px*m.h2m;
  const total=ip+h2rev;
  const costs=inv*1e6*m.cm*0.25;
  const gross=total-costs;

  let npv=-inv*1e6;
  for(let y=1;y<=10;y++) npv+=total*0.92/Math.pow(1+disc,y);

  let irr=0.01;
  for(let r=0.01;r<2;r+=0.005){
    let pv=-inv*1e6;
    for(let y=1;y<=10;y++) pv+=total/Math.pow(1+r,y);
    if(pv<0){irr=r;break;}
  }
  const payback=inv*1e6/Math.max(gross,1);
  const roi5=((total*5-inv*1e6)/(inv*1e6))*100;
  const scol={opt:'#00d4a0',base:'#3d8ef5',cons:'#f5a623'}[scen];
  const vals=[fmtM(total),fmtM(ip),fmtM(h2rev),fmtM(gross),fmtM(npv),fmtPct(irr*100),Math.round(payback*10)/10+' yr',Math.round(roi5)+'%'];

  document.getElementById('calc-results').innerHTML=t.res_labels.map((lbl,i)=>`
    <div class="row"><span class="rk">${lbl}</span>
    <span class="rv" style="color:${i>=4?scol:'var(--text)'}">${vals[i]}</span></div>`).join('');

  const yrs=Array.from({length:10},(_,i)=>'Y'+(i+1));
  const revD=yrs.map((_,i)=>Math.round(total*(1+i*0.06)/1e5)/10);
  let cum=-inv;
  const npvD=yrs.map((_,i)=>{
    cum+=total/Math.pow(1+disc,i+1)/1e6;
    return Math.round(cum*10)/10;
  });

  if(calcChart) calcChart.destroy();
  calcChart=new Chart(document.getElementById('calcChart').getContext('2d'),{
    data:{labels:yrs,datasets:[
      {type:'bar',label:'Revenue',data:revD,backgroundColor:scol+'88',borderColor:scol,borderWidth:1,borderRadius:3},
      {type:'line',label:'NPV',data:npvD,borderColor:'#a78bfa',borderWidth:2,pointRadius:3,fill:false,yAxisID:'y2'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#4a6080',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}},
        y:{ticks:{color:'#4a6080',font:{size:10},callback:v=>v+'M'},grid:{color:'rgba(255,255,255,0.04)'}},
        y2:{position:'right',ticks:{color:'#a78bfa',font:{size:10},callback:v=>v+'M'},grid:{display:false}}
      }}
  });
}

/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */
function render(){
  const t=T[lang];

  // Tagline pills
  document.getElementById('tbar').innerHTML=t.pills.map(p=>`
    <button class="tpill${activePill===p.id?' on':''}" data-id="${p.id}" onclick="togglePill('${p.id}')">
      <span class="tpill-dot"></span>${p.label}
    </button>`).join('');
  // Re-sync panel if open
  if(activePill){
    const pill=t.pills.find(p=>p.id===activePill);
    if(pill){
      document.getElementById('ip-title').textContent=pill.title;
      document.getElementById('ip-body').innerHTML=pill.body;
    }
  }

  // Nav
  ['nav-overview','nav-calc','nav-timeline','nav-market','nav-contact'].forEach((id,i)=>document.getElementById(id).textContent=t.nav[i]);

  // Overview metrics
  ['ov-l1','ov-l2','ov-l3','ov-l4'].forEach((id,i)=>document.getElementById(id).textContent=t.ov_l[i]);
  ['ov-s1','ov-s2','ov-s3','ov-s4'].forEach((id,i)=>document.getElementById(id).textContent=t.ov_s[i]);

  // Problem
  document.getElementById('ov-prob-title').textContent=t.prob_title;
  document.getElementById('ov-prob-prose').innerHTML=t.prob_prose;
  t.prob.forEach((_,i)=>{const k=document.getElementById('p'+(i+1)+'k');if(k)k.textContent=t.prob[i][0]});

  // Solution
  document.getElementById('ov-sol-title').textContent=t.sol_title;
  document.getElementById('ov-sol-prose').innerHTML=t.sol_prose;
  t.sol.forEach((_,i)=>{const k=document.getElementById('s'+(i+1)+'k');if(k)k.textContent=t.sol[i][0]});
  document.getElementById('s2v').textContent=t.sol_vals[0];
  document.getElementById('s3v').textContent=t.sol_vals[1];

  // Thermo
  document.getElementById('ov-thermo-title').textContent=t.thermo_title;
  document.getElementById('ov-thermo-prose').innerHTML=t.thermo_prose;

  // Cycle
  document.getElementById('ov-cycle-title').textContent=t.cycle_title;
  document.getElementById('cycle-flow').innerHTML=t.cycle.map(c=>c==='→'
    ?'<span style="color:var(--text3)">→</span>'
    :`<span style="padding:3px 9px;background:rgba(255,255,255,0.05);border-radius:20px;font-size:12px">${c}</span>`).join('');
  document.getElementById('ov-cycle-prose').innerHTML=t.cycle_prose;

  // Calc
  document.getElementById('calc-params-title').textContent=t.calc_params;
  document.getElementById('calc-results-title').textContent=t.calc_results;
  ['c-inv-l','c-homes-l','c-price-l','c-margin-l','c-h2p-l','c-h2px-l','c-disc-l'].forEach((id,i)=>document.getElementById(id).textContent=t.sliders[i]);
  ['scen-opt','scen-base','scen-cons'].forEach((id,i)=>document.getElementById(id).textContent=t.scenarios[i]);
  document.getElementById('calc-ctx-title').textContent=t.calc_ctx_title;
  document.getElementById('calc-ctx-prose').innerHTML=t.calc_ctx_prose;

  // Timeline
  document.getElementById('tl-phases-title').textContent=t.tl_phases_title;
  document.getElementById('tl-ms-title').textContent=t.tl_ms_title;
  document.getElementById('tl-items').innerHTML=t.phases.map(p=>`
    <div class="tli">
      <div class="tldot" style="background:${p.col}"></div>
      <div class="tlyear" style="color:${p.col}">${p.yr}</div>
      <div class="tltitle">${p.title}</div>
      <div class="tltext">${p.text}</div>
    </div>`).join('');
  const mc={bl:'bbl',tl:'btl',al:'bal'};
  document.getElementById('tl-milestones').innerHTML=t.milestones.map(m=>`
    <div class="row"><span class="rk">${m[0]}</span>
    <span class="badge-ms ${mc[m[2]]}">${m[1]}</span></div>`).join('');
  document.getElementById('tl-esb-title').textContent=t.tl_esb_title;
  document.getElementById('tl-esb-prose').innerHTML=t.tl_esb_prose;
  document.getElementById('tl-farm-title').textContent=t.tl_farm_title;
  document.getElementById('tl-farm-prose').innerHTML=t.tl_farm_prose;

  ['mk-s1','mk-s2','mk-s3'].forEach((id,i)=>document.getElementById(id).textContent=t.mk_subs[i]);

  document.getElementById('mk-absurd-prose').innerHTML=t.mk_absurd_prose;
  document.getElementById('mk-ifa-title').textContent=t.ifa_title;
  document.getElementById('mk-ifa-rows').innerHTML=t.ifa_rows.map(r=>`<div class="row"><span class="rk">${r[0]}</span><span class="rv">${r[1]}</span></div>`).join('');
  document.getElementById('mk-ifa-prose').innerHTML=t.ifa_prose;
  document.getElementById('mk-fund-title').textContent=t.fund_title;
  document.getElementById('mk-fund-rows').innerHTML=t.fund_rows.map(r=>`<div class="row"><span class="rk">${r[0]}</span><span class="rv">${r[1]}</span></div>`).join('');
  document.getElementById('mk-fund-prose').innerHTML=t.fund_prose;
  document.getElementById('mk-pilot-k').textContent=t.mk_pilot_k;

  document.getElementById('mk-fine-prose').innerHTML=t.mk_fine_prose;
  document.getElementById('cmp-title').textContent=t.cmp_title;
  document.getElementById('cmp-cards').innerHTML=t.solutions.map(s=>`
    <div class="${s.feat?'ccard feat':'ccard'}">
      ${s.feat?'<div class="cbadge">✓ Recommended</div>':''}
      <div class="cname">${s.name}</div>
      <div class="cprice" style="color:${s.col}">${s.price}</div>

      <div class="clist">${s.items.join('<br>')}</div>
    </div>`).join('');

  document.getElementById('mk-eco-prose').innerHTML=t.mk_eco_prose;

  document.getElementById('ct-role').textContent=t.ct_role;
  document.getElementById('ct-ip-note').textContent=t.ct_ip_note;
  document.getElementById('ct-why-title').textContent=t.ct_why_title;
  document.getElementById('ct-why-prose').innerHTML=t.ct_why_prose;
  document.getElementById('ct-form-title').textContent=t.ct_form_title;
  document.getElementById('ct-name').placeholder=t.ct_placeholders[0];
  document.getElementById('ct-email').placeholder=t.ct_placeholders[1];
  document.getElementById('ct-msg').placeholder=t.ct_msg_ph;
  document.getElementById('ct-btn').textContent=t.ct_btn;
  t.ct_opts.forEach((opt,i)=>document.getElementById('ct-opt'+(i+1)).textContent=opt);

  // Install banner
  const banner=document.getElementById('install-banner');
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  const isAndroid=/Android/.test(navigator.userAgent);
  if(isIOS){banner.innerHTML=t.install_ios;banner.classList.add('show');}
  else if(isAndroid){banner.innerHTML=t.install_android;banner.classList.add('show');}
}
