function showTab(id){document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));document.getElementById('tab-'+id).classList.add('on');const idx={overview:0,calc:1,timeline:2,market:3,contact:4}[id];document.querySelectorAll('.nb')[idx].classList.add('on');if(id==='calc')setTimeout(recalc,60);if(id==='timeline')setTimeout(renderTlChart,60)}
function togglePill(id){const t=T[lang];const pill=t.pills.find(p=>p.id===id);const panel=document.getElementById('ipanel');if(activePill===id){activePill=null;panel.classList.remove('show');document.querySelectorAll('.tpill').forEach(p=>p.classList.remove('on'));return}activePill=id;document.querySelectorAll('.tpill').forEach(p=>p.classList.remove('on'));document.querySelector(`.tpill[data-id="${id}"]`).classList.add('on');document.getElementById('ip-title').textContent=pill.title;document.getElementById('ip-body').innerHTML=pill.body;panel.classList.add('show')}
function setScen(s,btn){scen=s;document.querySelectorAll('.stab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');recalc()}
function fmtM(n){const a=Math.abs(n);const s=n<0?'-':'';return s+'€'+Math.round(a/1e5)/10+'M'}
function fmtPct(n){return Math.round(n*10)/10+'%'}
function recalc(){const t=T[lang];const inv=parseFloat(document.getElementById('inv').value);const homes=parseInt(document.getElementById('homes').value);const price=parseFloat(document.getElementById('price').value);const margin=parseFloat(document.getElementById('margin').value)/100;const h2prod=parseInt(document.getElementById('h2prod').value);const h2px=parseFloat(document.getElementById('h2px').value);const disc=parseFloat(document.getElementById('disc').value)/100;const m=SCEN[scen];document.getElementById('inv-v').textContent='€'+inv+'M';document.getElementById('homes-v').textContent=homes.toLocaleString();document.getElementById('price-v').textContent='€'+price+'k';document.getElementById('margin-v').textContent=Math.round(margin*100)+'%';document.getElementById('h2prod-v').textContent=h2prod.toLocaleString()+'t';document.getElementById('h2px-v').textContent='€'+h2px+'/kg';document.getElementById('disc-v').textContent=Math.round(disc*100)+'%';const rev_boiler=homes*price*1000*m.rm;const ip=rev_boiler*margin;const h2rev=h2prod*1000*h2px*m.h2m;const total=ip+h2rev;const costs=inv*1e6*m.cm*0.25;const gross=total-costs;let npv=-inv*1e6;for(let y=1;y<=10;y++)npv+=total*0.92/Math.pow(1+disc,y);let irr=0.01;for(let r=0.01;r<2;r+=0.005){let pv=-inv*1e6;for(let y=1;y<=10;y++)pv+=total/Math.pow(1+r,y);if(pv<0){irr=r;break}}const payback=inv*1e6/Math.max(gross,1);const roi5=((total*5-inv*1e6)/(inv*1e6))*100;const scol={opt:'#00d4a0',base:'#3d8ef5',cons:'#f5a623'}[scen];const vals=[fmtM(total),fmtM(ip),fmtM(h2rev),fmtM(gross),fmtM(npv),fmtPct(irr*100),Math.round(payback*10)/10+' yr',Math.round(roi5)+'%'];document.getElementById('calc-results').innerHTML=t.res_labels.map((lbl,i)=>`<div class="row"><span class="rk">${lbl}</span><span class="rv" style="color:${i>=4?scol:'var(--text)'}">${vals[i]}</span></div>`).join('');const yrs=Array.from({length:10},(_,i)=>'Y'+(i+1));const revD=yrs.map((_,i)=>Math.round(total*(1+i*0.06)/1e5)/10);let cum=-inv;const npvD=yrs.map((_,i)=>{cum+=total/Math.pow(1+disc,i+1)/1e6;return Math.round(cum*10)/10});if(calcChart)calcChart.destroy();calcChart=new Chart(document.getElementById('calcChart').getContext('2d'),{data:{labels:yrs,datasets:[{type:'bar',data:revD,backgroundColor:scol+'88',borderColor:scol,borderWidth:1,borderRadius:3},{type:'line',data:npvD,borderColor:'#a78bfa',borderWidth:2,pointRadius:3,fill:false,yAxisID:'y2'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#4a6080',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#4a6080',font:{size:10},callback:v=>v+'M'},grid:{color:'rgba(255,255,255,0.04)'}},y2:{position:'right',ticks:{color:'#a78bfa',font:{size:10},callback:v=>v+'M'},grid:{display:false}}}}})}
function renderTlChart(){if(tlChart)tlChart.destroy();const ctx=document.getElementById('tlChart');if(!ctx)return;tlChart=new Chart(ctx,{type:'bar',data:{labels:['2026','2027','2028','2029','2030','2032','2035','2040','2045'],datasets:[{data:[0.01,0.05,0.5,2,10,50,150,300,445],backgroundColor:['#3d8ef578','#3d8ef578','#00d4a078','#00d4a078','#00d4a0aa','#f5a62378','#f5a623aa','#a78bfa78','#a78bfaaa'],borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#4a6080',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#4a6080',font:{size:10},callback:v=>v+'k'},grid:{color:'rgba(255,255,255,0.04)'}}}}})}
function submitForm(){const t=T[lang];document.getElementById('ct-thanks').style.display='block';document.getElementById('ct-thanks').textContent=t.ct_thanks;document.getElementById('ct-btn').disabled=true;document.getElementById('ct-btn').style.opacity='0.4'}
function render(){const t=T[lang];document.getElementById('tbar').innerHTML=t.pills.map(p=>`<button class="tpill${activePill===p.id?' on':''}" data-id="${p.id}" onclick="togglePill('${p.id}')"><span class="tpill-dot"></span>${p.label}</button>`).join('');['nav-overview','nav-calc','nav-timeline','nav-market','nav-contact'].forEach((id,i)=>document.getElementById(id).textContent=t.nav[i]);['ov-l1','ov-l2','ov-l3','ov-l4'].forEach((id,i)=>document.getElementById(id).textContent=t.ov_l[i]);['ov-s1','ov-s2','ov-s3','ov-s4'].forEach((id,i)=>document.getElementById(id).textContent=t.ov_s[i]);document.getElementById('ov-prob-title').textContent=t.prob_title;document.getElementById('ov-prob-prose').innerHTML=t.prob_prose;t.prob.forEach((_,i)=>document.getElementById('p'+(i+1)+'k').textContent=t.prob[i][0]);document.getElementById('ov-sol-title').textContent=t.sol_title;document.getElementById('ov-sol-prose').innerHTML=t.sol_prose;t.sol.forEach((_,i)=>document.getElementById('s'+(i+1)+'k').textContent=t.sol[i][0]);document.getElementById('s2v').textContent=t.sol_vals[0];document.getElementById('s3v').textContent=t.sol_vals[1];document.getElementById('calc-params-title').textContent=t.calc_params;document.getElementById('calc-results-title').textContent=t.calc_results;['c-inv-l','c-homes-l','c-price-l','c-margin-l','c-h2p-l','c-h2px-l','c-disc-l'].forEach((id,i)=>document.getElementById(id).textContent=t.sliders[i]);['scen-opt','scen-base','scen-cons'].forEach((id,i)=>document.getElementById(id).textContent=t.scenarios[i]);document.getElementById('tl-phases-title').textContent=t.tl_phases_title;document.getElementById('tl-ms-title').textContent=t.tl_ms_title;document.getElementById('tl-items').innerHTML=t.phases.map(p=>`<div class="tli"><div class="tldot" style="background:${p.col}"></div><div class="tlyear" style="color:${p.col}">${p.yr}</div><div class="tltitle">${p.title}</div><div class="tltext">${p.text}</div></div>`).join('');const mc={bl:'bbl',tl:'btl',al:'bal'};document.getElementById('tl-milestones').innerHTML=t.milestones.map(m=>`<div class="row"><span class="rk">${m[0]}</span><span class="badge-ms ${mc[m[2]]}">${m[1]}</span></div>`).join('');['mk-l1','mk-l2','mk-l3'].forEach((id,i)=>document.getElementById(id).textContent=t.mk_labels[i]);['mk-s1','mk-s2','mk-s3'].forEach((id,i)=>document.getElementById(id).textContent=t.mk_subs[i]);document.getElementById('mk-absurd-title').textContent=t.mk_absurd_title;document.getElementById('mk-absurd-prose').innerHTML=t.mk_absurd_prose;document.getElementById('mk-ifa-title').textContent=t.ifa_title;document.getElementById('mk-ifa-rows').innerHTML=t.ifa_rows.map(r=>`<div class="row"><span class="rk">${r[0]}</span><span class="rv">${r[1]}</span></div>`).join('');document.getElementById('mk-ifa-prose').innerHTML=t.ifa_prose;document.getElementById('mk-fund-title').textContent=t.fund_title;document.getElementById('mk-fund-rows').innerHTML=t.fund_rows.map(r=>`<div class="row"><span class="rk">${r[0]}</span><span class="rv">${r[1]}</span></div>`).join('');document.getElementById('mk-fund-prose').innerHTML=t.fund_prose;document.getElementById('ct-info-title').textContent=t.ct_info_title;document.getElementById('ct-info-rows').innerHTML=t.ct_info.map(r=>`<div class="row"><span class="rk">${r[0]}</span><span class="rv">${r[1]}</span></div>`).join('');document.getElementById('ct-form-title').textContent=t.ct_form_title;document.getElementById('ct-name').placeholder=t.ct_placeholders[0];document.getElementById('ct-email').placeholder=t.ct_placeholders[1];document.getElementById('ct-msg').placeholder=t.ct_msg_ph;document.getElementById('ct-btn').textContent=t.ct_btn;t.ct_opts.forEach((opt,i)=>document.getElementById('ct-opt'+(i+1)).textContent=opt)}
render();setTimeout(()=>{recalc();renderTlChart()},150);
</script>
