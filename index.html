const T={en:{pills:[{id:'dropin',label:'Drop-In Decarbonisation',title:'Drop-In Decarbonisation',body:'Ireland cannot meet its 2030 climate targets without decarbonising heat.'},{id:'green',label:'Green Hydrogen',title:'Green Hydrogen from Curtailed Wind',body:'We capture curtailed wind power and convert it to green hydrogen.'},{id:'circular',label:'Circular Economy',title:'The Circular Economy Loop',body:'Wind → H₂ → Heat → Farm transition → Forests → Clean water → Reinvest.'},{id:'pilot',label:'County Clare Pilot',title:'County Clare Pilot Site',body:'County Clare is positioned as the first demonstrator.'},{id:'national',label:'National Rollout',title:'National Rollout Strategy',body:'Pilot → scale → national template → export model.'}],nav:['Overview','Calculator','Timeline','Market','Contact'],ov_l:['Pilot Funding','Market Size','Installation Cost','Jobs Potential'],ov_s:['DTIF / Clare CC','hard-to-treat homes','vs €49.6k deep retrofit','by 2030'],prob_title:'THE PROBLEM — IRELAND\'S RETROFIT CRISIS',prob_prose:'<p>Ireland has a major retrofit gap in residential heating.</p>',prob:[['Retrofit target by 2030',''],['Completed to date',''],['Hard-to-treat (no solution)',''],['Deep retrofit cost / home',''],['Total cost without H₂',''],['EU fines if targets missed','']],sol_title:'THE H₂ SOLUTION — DROP-IN TECHNOLOGY',sol_prose:'<p>The H₂-ready boiler replaces only the burner and keeps existing radiators and pipework.</p>',sol:[['Installation cost',''],['Installation time',''],['Structural changes',''],['Boiler efficiency',''],['H₂ cost from wind',''],['H₂ cost from grid','']],sol_vals:['1 day','Zero'],thermo_title:'THERMODYNAMIC STRATEGY — IRELAND AS CLOSED SYSTEM',thermo_prose:'<p>Ireland can be treated as a closed island system with measurable energy flows.</p>',cycle_title:'CIRCULAR ECONOMY LOOP',cycle:['Wind (2.1 TWh)','→','Electrolysis','→','Green H₂','→','Home Heat','→','Farm Subsidies','→','Forests / SAC','→','Clean Water','→','Health Savings','→','Reinvest const SCEN={opt:{rm:1.3,cm:0.85,h2m:1.2},base:{rm:1.0,cm:1.0,h2m:1.0},cons:{rm:0.7,cm:1.2,h2m:0.8}};let lang='en',scen='opt',calcChart=null,tlChart=null,activePill=null;
function setLang(l){lang=l;document.querySelectorAll('.lb').forEach(b=>b.classList.remove('on'));const btn=document.querySelector(`.lb[onclick="setLang('${l}')"]`);if(btn)btn.classList.add('on');activePill=null;render()}
function showTab(id){document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));document.getElementById('tab-'+id).classList.add('on');const idx={overview:0,calc:1,timeline:2,market:3,contact:4}[id];document.querySelectorAll('.nb')[idx].classList.add('on');if(id==='calc') setTimeout(recalc,60)}
function togglePill(id){const t=T.en;const pill=(t.pills||[]).find(p=>p.id===id);const panel=document.getElementById('ipanel');if(activePill===id){activePill=null;panel.classList.remove('show');document.querySelectorAll('.tpill').forEach(p=>p.classList.remove('on'));return}activePill=id;document.querySelectorAll('.tpill').forEach(p=>p.classList.remove('on'));const pillBtn=document.querySelector(`.tpill[data-id="${id}"]`);if(pillBtn)pillBtn.classList.add('on');document.getElementById('ip-title').textContent=pill.title;document.getElementById('ip-body').innerHTML=pill.body;panel.classList.add('show')}
function setScen(s,btn){scen=s;document.querySelectorAll('.stab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');recalc()}
function fmtM(n){const a=Math.abs(n);const s=n<0?'-':'';return s+'€'+Math.round(a/1e5)/10+'M'}
function fmtPct(n){return Math.round(n*10)/10+'%'}
function recalc(){const t=T.en;const inv=document.getElementById('inv');if(!inv) return;const invV=parseFloat(inv.value);const homes=parseInt(document.getElementById('homes').value);const price=parseFloat(document.getElementById('price').value);const margin=parseFloat(document.getElementById('margin').value)/100;const h2prod=parseInt(document.getElementById('h2prod').value);const h2px=parseFloat(document.getElementById('h2px').value);const disc=parseFloat(document.getElementById('disc').value)/100;const m=SCEN[scen];document.getElementById('inv-v').textContent='€'+invV+'M';document.getElementById('homes-v').textContent=homes.toLocaleString();document.getElementById('price-v').textContent='€'+price+'k';document.getElementById('margin-v').textContent=Math.round(margin*100)+'%';document.getElementById('h2prod-v').textContent=h2prod.toLocaleString()+'t';document.getElementById('h2px-v').textContent='€'+h2px+'/kg';document.getElementById('disc-v').textContent=Math.round(disc*100)+'%';const rev_boiler=homes*price*1000*m.rm;const ip=rev_boiler*margin;const h2rev=h2prod*1000*h2px*m.h2m;const total=ip+h2rev;const costs=invV*1e6*m.cm*0.25;const gross=total-costs;let npv=-invV*1e6;for(let y=1;y<=10;y++) npv+=total*0.92/Math.pow(1+disc,y);let irr=0.01;for(let r=0.01;r<2;r+=0.005){let pv=-invV*1e6;for(let y=1;y<=10;y++) pv+=total/Math.pow(1+r,y);if(pv<0){irr=r;break}}const payback=invV*1e6/Math.max(gross,1);const roi5=((total*5-invV*1e6)/(invV*1e6))*100;const scol={opt:'#00d4a0',base:'#3d8ef5',cons:'#f5a623'}[scen];const vals=[fmtM(total),fmtM(ip),fmtM(h2rev),fmtM(gross),fmtM(npv),fmtPct(irr*100),Math.round(payback*10)/10+' yr',Math.round(roi5)+'%'];document.getElementById('calc-results').innerHTML=t.res_labels.map((lbl,i)=>`<div class="row"><span class="rk">${lbl}</span><span class="rv" style="color:${i>=4?scol:'var(--text)'}">${vals[i]}</span></div>`).join('');if(typeof Chart!=='undefined'){const yrs=Array.from({length:10},(_,i)=>'Y'+(i+1));const revD=yrs.map((_,i)=>Math.round(total*(1+i*0.06)/1e5)/10);let cum=-invV;const npvD=yrs.map((_,i)=>{cum+=total/Math.pow(1+disc,i+1)/1e6;return Math.round(cum*10)/10});if(calcChart) calcChart.destroy();calcChart=new Chart(document.getElementById('calcChart').getContext('2d'),{data:{labels:yrs,datasets:[{type:'bar',label:'Revenue',data:revD,backgroundColor:scol+'88',borderColor:scol,borderWidth:1,borderRadius:3},{type:'line',label:'NPV',data:npvD,borderColor:'#a78bfa',borderWidth:2,pointRadius:3,fill:false,yAxisID:'y2'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#4a6080',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#4a6080',font:{size:10},callback:v=>v+'M'},grid:{color:'rgba(255,255,255,0.04)'}},y2:{position:'right',ticks:{color:'#a78bfa',font:{size:10},callback:v=>v+'M'},grid:{display:false}}}}})}}
function submitForm(){const thanks=document.getElementById('ct-thanks');if(thanks){thanks.style.display='block';thanks.textContent='Thank you — we will respond within 48 hours.'}const btn=document.getElementById('ct-btn');if(btn){btn.disabled=true;btn.style.opacity='0.4'}}
function render(){const t=T.en;const pills=t.pills||[];document.getElementById('tbar').innerHTML=pills.map(p=>`<button class="tpill${activePill===p.id?' on':''}" data-id="${p.id}" onclick="togglePill('${p.id}')"><span class="tpill-dot"></span>${p.label}</button>`).join('');['nav-overview','nav-calc','nav-timeline','nav-market','nav-contact'].forEach((id,i)=>{const el=document.getElementById(id);if(el)el.textContent=t.nav[i]||['Overview','Calculator','Timeline','Market','Contact'][i]});['ov-l1','ov-l2','ov-l3','ov-l4'].forEach((id,i)=>{const el=document.getElementById(id);if(el)el.textContent=t.ov_l[i]});['ov-s1','ov-s2','ov-s3','ov-s4'].forEach((id,i)=>{const el=document.getElementById(id);if(el)el.textContent=t.ov_s[i]});document.getElementById('ov-prob-title').textContent=t.prob_title;document.getElementById('ov-prob-prose').innerHTML=t.prob_prose;document.getElementById('ov-sol-title').textContent=t.sol_title;document.getElementById('ov-sol-prose').innerHTML=t.sol_prose;document.getElementById('ov-thermo-title').textContent=t.thermo_title;document.getElementById('ov-thermo-prose').innerHTML=t.thermo_prose;document.getElementById('ov-cycle-title').textContent=t.cycle_title;document.getElementById('cycle-flow').innerHTML=t.cycle.map(c=>c==='→'?'<span style="color:var(--text3)">→</span>':`<span style="padding:3px 9px;background:rgba(255,255,255,0.05);border-radius:20px;font-size:12px">${c}</span>`).join('');document.getElementById('ov-cycle-prose').innerHTML=t.cycle_prose;document.getElementById('calc-params-title').textContent=t.calc_params;document.getElementById('calc-results-title').textContent=t.calc_results;['c-inv-l','c-homes-l','c-price-l','c-margin-l','c-h2p-l','c-h2px-l','c-disc-l'].forEach((id,i)=>{const el=document.getElementById(id);if(el)el.textContent=t.sliders[i]});['scen-opt','scen-base','scen-cons'].forEach((id,i)=>{const el=document.getElementById(id);if(el)el.textContent=t.scenarios[i]});document.getElementById('calc-ctx-title').textContent=t.calc_ctx_title;document.getElementById('calc-ctx-prose').innerHTML=t.calc_ctx_prose}
