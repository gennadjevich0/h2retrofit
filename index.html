*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080e1c;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#e2e8f4;--text2:#8fa3c0;--text3:#4a6080;--teal:#00d4a0;--teal2:rgba(0,212,160,0.1);--teal3:rgba(0,212,160,0.06);--amber:#f5a623;--red:#e84040;--blue:#3d8ef5;--purple:#a78bfa}
html{scroll-behavior:smooth}body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;padding-top:env(safe-area-inset-top)}.outer{max-width:980px;margin:0 auto;padding:0 20px 80px}.hdr{padding:20px 0 14px;border-bottom:1px solid var(--border);margin-bottom:20px}.hdr-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}.logo{display:flex;align-items:center;gap:10px}.logo svg{width:34px;height:34px;flex-shrink:0}.logo-txt{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:-0.3px}.logo-txt em{color:var(--teal);font-style:normal}.lang-bar{display:flex;gap:4px}.lb{padding:4px 12px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border2);border-radius:20px;color:var(--text2);background:transparent;transition:all .15s;font-family:'DM Sans',sans-serif}.lb.on,.lb:hover{border-color:var(--teal);color:var(--teal);background:var(--teal2)}.tbar{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}.tpill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;font-size:11px;cursor:pointer;border:1px solid var(--border);border-radius:20px;color:var(--text3);background:transparent;transition:all .18s;font-family:'DM Sans',sans-serif}.tpill:hover,.tpill.on{border-color:var(--teal);color:var(--teal);background:var(--teal3)}.tpill-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}.ipanel{display:none;margin-top:10px;padding:14px 16px;background:rgba(0,212,160,0.05);border:1px solid rgba(0,212,160,0.18);border-radius:10px;animation:fin .18s}.ipanel.show{display:block}.ip-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--teal);margin-bottom:6px}.ip-body{font-size:13px;color:var(--text2);line-height:1.75}.ip-body strong{color:var(--text);font-weight:500}.ip-body .stat{display:inline-block;background:rgba(255,255,255,0.06);border-radius:5px;padding:1px 7px;margin:1px 2px;font-size:12px;color:var(--teal);font-weight:500}@keyframes fin{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}.nav{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}.nav::-webkit-scrollbar{display:none}.nb{padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}.nb.on{color:var(--teal);border-bottom-color:var(--teal)}.nb:hover:not(.on){color:var(--text)}.sec{display:none}.sec.on{display:block}.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}.g2n{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}@media(max-width:600px){.g4{grid-template-columns:1fr 1fr}.g2,.g2n{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}}.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:0}.mcard{background:var(--card);border-radius:10px;padding:13px 15px}.mlabel{font-size:11px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}.mval{font-size:21px;font-weight:500;line-height:1.2}.msub{font-size:11px;color:var(--text3);margin-top:2px}.teal{color:var(--teal)}.amber{color:var(--amber)}.red{color:var(--red)}.blue{color:var(--blue)}.purple{color:var(--purple)}.st{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;margin-top:14px}.st:first-child{margin-top:0}.row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px}.row:last-child{border:none}.rk{color:var(--text2);flex:1}.rv{font-weight:500;text-align:right;flex-shrink:0}.hl{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;background:rgba(0,212,160,0.07);border:1px solid rgba(0,212,160,0.2);border-radius:8px;margin:7px 0;font-size:13px;gap:8px}.hlk{color:var(--teal)}.hlv{font-weight:500;color:var(--teal);text-align:right}.hl-red{background:rgba(232,64,64,0.06);border-color:rgba(232,64,64,0.2)}.hlk-r{color:var(--red)}.hlv-r{color:var(--red);font-weight:500;text-align:right}.prose{font-size:13px;color:var(--text2);line-height:1.8}.prose p{margin-bottom:10px}.prose p:last-child{margin-bottom:0}.prose strong{color:var(--text);font-weight:500}.hero-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border:1px solid rgba(0,212,160,0.3);border-radius:10px;background:rgba(0,212,160,0.08);color:var(--teal);text-decoration:none;font-weight:700;margin-top:12px}

<body>
<div class="outer">
<div class="hdr"><div class="hdr-top"><div class="logo"><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="64" rx="14" fill="#080e1c"/><circle cx="22" cy="32" r="10" fill="none" stroke="#00d4a0" stroke-width="2.5"/><circle cx="42" cy="32" r="10" fill="none" stroke="#00d4a0" stroke-width="2.5"/><line x1="22" y1="28" x2="42" y2="28" stroke="#00d4a0" stroke-width="2"/><line x1="22" y1="36" x2="42" y2="36" stroke="#00d4a0" stroke-width="2"/><circle cx="32" cy="14" r="6" fill="#00d4a0" opacity=".8"/><circle cx="32" cy="50" r="6" fill="#00d4a0" opacity=".8"/><line x1="24" y1="24" x2="28" y2="18" stroke="#00d4a0" stroke-width="1.5" opacity=".5"/><line x1="40" y1="24" x2="36" y2="18" stroke="#00d4a0" stroke-width="1.5" opacity=".5"/><line x1="24" y1="40" x2="28" y2="46" stroke="#00d4a0" stroke-width="1.5" opacity=".5"/><line x1="40" y1="40" x2="36" y2="46" stroke="#00d4a0" stroke-width="1.5" opacity=".5"/><text x="17" y="36" font-family="Arial Black" font-weight="900" font-size="11" fill="#00d4a0">H</text><text x="36" y="36" font-family="Arial Black" font-weight="900" font-size="11" fill="#00d4a0">₂</text></svg><span class="logo-txt"><em>H₂</em>-Retrofit Ireland</span></div><div class="lang-bar"><button class="lb on" onclick="setLang('en')">EN</button><button class="lb" onclick="setLang('fr')">FR</button><button class="lb" onclick="setLang('de')">DE</button><button class="lb" onclick="setLang('es')">ES</button><button class="lb" onclick="setLang('ru')">RU</button></div></div><div class="tbar" id="tbar"></div><div class="ipanel" id="ipanel"><div class="ip-title" id="ip-title"></div><div class="ip-body" id="ip-body"></div></div><div class="install-banner" id="install-banner"></div></div>
<div class="nav"><button class="nb on" onclick="showTab('overview')" id="nav-overview"></button><button class="nb" onclick="showTab('calc')" id="nav-calc"></button><button class="nb" onclick="showTab('timeline')" id="nav-timeline"></button><button class="nb" onclick="showTab('market')" id="nav-market"></button><button class="nb" onclick="showTab('contact')" id="nav-contact"></button></div>
<div id="tab-overview" class="sec on"><div class="g4"><div class="mcard"><div class="mlabel" id="ov-l1"></div><div class="mval teal">€1.5M</div><div class="msub" id="ov-s1"></div></div><div class="mcard"><div class="mlabel" id="ov-l2"></div><div class="mval">445k</div><div class="msub" id="ov-s2"></div></div><div class="mcard"><div class="mlabel" id="ov-l3"></div><div class="mval teal">€3–6k</div><div class="msub" id="ov-s3"></div></div><div class="mcard"><div class="mlabel" id="ov-l4"></div><div class="mval teal">50k+</div><div class="msub" id="ov-s4"></div></div></div><div class="card" style="margin-bottom:14px"><div class="st" id="ov-prob-title"></div><div class="prose" id="ov-prob-prose"></div><a class="hero-btn" href="h2-cost-calculator.html">H2 price</a></div><div class="card" style="margin-bottom:14px"><div class="st" id="ov-sol-title"></div><div class="prose" id="ov-sol-prose"></div></div></div>
<div id="tab-calc" class="sec"><div class="stabs"><button class="stab opt on" onclick="setScen('opt',this)" id="scen-opt"></button><button class="stab base" onclick="setScen('base',this)" id="scen-base"></button><button class="stab cons" onclick="setScen('cons',this)" id="scen-cons"></button></div><div class="g2"><div class="card"><div class="st" id="calc-params-title"></div><div class="sr"><span class="sl" id="c-inv-l"></span><input type="range" min="1" max="50" step="0.5" value="5" id="inv" oninput="recalc()"><span class="sv" id="inv-v">€5M</span></div><div class="sr"><span class="sl" id="c-homes-l"></span><input type="range" min="100" max="20000" step="100" value="1000" id="homes" oninput="recalc()"><span class="sv" id="homes-v">1,000</span></div><div class="sr"><span class="sl" id="c-price-l"></span><input type="range" min="3" max="8" step="0.5" value="4.5" id="price" oninput="recalc()"><span class="sv" id="price-v">€4.5k</span></div><div class="sr"><span class="sl" id="c-margin-l"></span><input type="range" min="2" max="25" step="1" value="8" id="margin" oninput="recalc()"><span class="sv" id="margin-v">8%</span></div><div class="sr"><span class="sl" id="c-h2p-l"></span><input type="range" min="100" max="5000" step="100" value="1000" id="h2prod" oninput="recalc()"><span class="sv" id="h2prod-v">1,000t</span></div><div class="sr"><span class="sl" id="c-h2px-l"></span><input type="range" min="2" max="12" step="0.5" value="4" id="h2px" oninput="recalc()"><span class="sv" id="h2px-v">€4/kg</span></div><div class="sr"><span class="sl" id="c-disc-l"></span><input type="range" min="3" max="15" step="1" value="8" id="disc" oninput="recalc()"><span class="sv" id="disc-v">8%</span></div></div><div class="card"><div class="st" id="calc-results-title"></div><div id="calc-results"></div><div class="ch-wrap"><canvas id="calcChart"></canvas></div></div></div><div class="card" style="margin-top:0"><div class="st" id="calc-ctx-title"></div><div class="prose" id="calc-ctx-prose"></div></div></div>
<div id="tab-timeline" class="sec"><div class="card"><div class="st">Timeline</div></div></div>
<div id="tab-market" class="sec"><div class="card"><div class="st">Market</div></div></div>
<div id="tab-contact" class="sec"><div class="card"><div class="st">Contact</div></div></div>
</div>
<script>
const T={en:{pills:[{id:'dropin',label:'Drop-In Decarbonisation',title:'Drop-In Decarbonisation',body:'Ireland cannot meet its 2030 climate targets without decarbonising heat.'}],nav:['Overview','Calculator','Timeline','Market','Contact'],ov_l:['Pilot Funding','Market Size','Installation Cost','Jobs Potential'],ov_s:['DTIF / Clare CC','hard-to-treat homes','vs €49.6k deep retrofit','by 2030'],prob_title:'THE PROBLEM — IRELAND\'S RETROFIT CRISIS',prob_prose:'<p>Open the H2 price button to access the hydrogen cost calculator.</p>',sol_title:'THE H₂ SOLUTION — DROP-IN TECHNOLOGY',sol_prose:'<p>The H₂-ready boiler replaces only the burner and keeps existing radiators and pipework.</p>',calc_params:'INVESTMENT PARAMETERS',calc_results:'RESULTS',sliders:['Investment (€M)','Homes (Phase 1)','Boiler price (€k)','IP margin (%)','H₂ output (t/yr)','H₂ sale price (€/kg)','Discount rate (%)'],scenarios:['Optimistic','Base Case','Conservative'],res_labels:['Annual revenue','IP royalties / yr','H₂ sales / yr','Gross profit','NPV (10 yr)','IRR','Payback period','ROI (5 yr)'],calc_ctx_title:'IP MODEL & FUNDING STRUCTURE',calc_ctx_prose:'Funding path: pilot → self-funded scale-up.'}};
const SCEN={opt:{rm:1.3,cm:0.85,h2m:1.2},base:{rm:1.0,cm:1.0,h2m:1.0},cons:{rm:0.7,cm:1.2,h2m:0.8}};let scen='opt';
function setLang(){}
function showTab(id){document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));document.getElementById('tab-'+id).classList.add('on');const idx={overview:0,calc:1,timeline:2,market:3,contact:4}[id];document.querySelectorAll('.nb')[idx].classList.add('on');if(id==='calc') setTimeout(recalc,60)}
function togglePill(){}
function setScen(s,btn){scen=s;document.querySelectorAll('.stab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');recalc()}
function fmtM(n){const a=Math.abs(n);const s=n<0?'-':'';return s+'€'+Math.round(a/1e5)/10+'M'}
function fmtPct(n){return Math.round(n*10)/10+'%'}
function recalc(){const t=T.en;const inv=document.getElementById('inv');if(!inv) return;const invV=parseFloat(inv.value);const homes=parseInt(document.getElementById('homes').value);const price=parseFloat(document.getElementById('price').value);const margin=parseFloat(document.getElementById('margin').value)/100;const h2prod=parseInt(document.getElementById('h2prod').value);const h2px=parseFloat(document.getElementById('h2px').value);const disc=parseFloat(document.getElementById('disc').value)/100;const m=SCEN[scen];document.getElementById('inv-v').textContent='€'+invV+'M';document.getElementById('homes-v').textContent=homes.toLocaleString();document.getElementById('price-v').textContent='€'+price+'k';document.getElementById('margin-v').textContent=Math.round(margin*100)+'%';document.getElementById('h2prod-v').textContent=h2prod.toLocaleString()+'t';document.getElementById('h2px-v').textContent='€'+h2px+'/kg';document.getElementById('disc-v').textContent=Math.round(disc*100)+'%';const rev_boiler=homes*price*1000*m.rm;const ip=rev_boiler*margin;const h2rev=h2prod*1000*h2px*m.h2m;const total=ip+h2rev;const costs=invV*1e6*m.cm*0.25;const gross=total-costs;let npv=-invV*1e6;for(let y=1;y<=10;y++) npv+=total*0.92/Math.pow(1+disc,y);let irr=0.01;for(let r=0.01;r<2;r+=0.005){let pv=-invV*1e6;for(let y=1;y<=10;y++) pv+=total/Math.pow(1+r,y);if(pv<0){irr=r;break}}const payback=invV*1e6/Math.max(gross,1);const roi5=((total*5-invV*1e6)/(invV*1e6))*100;const vals=[fmtM(total),fmtM(ip),fmtM(h2rev),fmtM(gross),fmtM(npv),fmtPct(irr*100),Math.round(payback*10)/10+' yr',Math.round(roi5)+'%'];document.getElementById('calc-results').innerHTML=t.res_labels.map((lbl,i)=>`<div class="row"><span class="rk">${lbl}</span><span class="rv">${vals[i]}</span></div>`).join('')}
function render(){const t=T.en;document.getElementById('tbar').innerHTML=t.pills.map(p=>`<button class="tpill" data-id="${p.id}"><span class="tpill-dot"></span>${p.label}</button>`).join('');['nav-overview','nav-calc','nav-timeline','nav-market','nav-contact'].forEach((id,i)=>document.getElementById(id).textContent=t.nav[i]);['ov-l1','ov-l2','ov-l3','ov-l4'].forEach((id,i)=>document.getElementById(id).textContent=t.ov_l[i]);['ov-s1','ov-s2','ov-s3','ov-s4'].forEach((id,i)=>document.getElementById(id).textContent=t.ov_s[i]);document.getElementById('ov-prob-title').textContent=t.prob_title;document.getElementById('ov-prob-prose').innerHTML=t.prob_prose;document.getElementById('ov-sol-title').textContent=t.sol_title;document.getElementById('ov-sol-prose').innerHTML=t.sol_prose;document.getElementById('calc-params-title').textContent=t.calc_params;document.getElementById('calc-results-title').textContent=t.calc_results;['c-inv-l','c-homes-l','c-price-l','c-margin-l','c-h2p-l','c-h2px-l','c-disc-l'].forEach((id,i)=>document.getElementById(id).textContent=t.sliders[i]);['scen-opt','scen-base','scen-cons'].forEach((id,i)=>document.getElementById(id).textContent=t.scenarios[i]);document.getElementById('calc-ctx-title').textContent=t.calc_ctx_title;document.getElementById('calc-ctx-prose').innerHTML=t.calc_ctx_prose}
render();setTimeout(()=>{recalc()},150);
</script>
</body>
